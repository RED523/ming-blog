name: Sync Post

# Controls when the workflow will run
on:
  # schedule:
  #   - cron: "30 1 * * *"
  # https://docs.github.com/cn/developers/webhooks-and-events/events/issue-event-types
  issues:
    types:
      - opened
      - closed
      - edited
      - renamed
      - labeled
      - unlabeled
      - reopened
      - committed # 修改？
  workflow_dispatch:

permissions:
  contents: write
  
env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  GH_USER: ${{ secrets.GH_USER }}
  GH_PROJECT_NAME: ${{ secrets.GH_PROJECT_NAME }}
jobs:
  Publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2

      - name: Setup Node.js 🚀
        uses: actions/setup-node@v3
        with:
          node-version: '20.11.0' # 指定具体的版本号

      - name: Git config 🔧
        run: |
          git config --global user.name "zhaozhongming"
          git config --global user.email "coderzzm@foxmail.com"

      - name: Display runtime info ✨
        run: |
          echo '当前目录：'
          pwd
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.6.0 # 或者您想要使用的 pnpm 版本

      - name: Install 🔧
        run: pnpm install

      # - name: Build ⛏️
      #   run: pnpm run build

      - name: Update blog files ⛏️
        run: |
          echo "🚀 开始同步文章..."
          pnpm run sync-post && \
          echo "✅ 文章同步完成，开始生成 RSS..."
          pnpm run generate-rss && \
          echo "✅ RSS 生成完成"
          git add . && \
          git commit -m 'chore(ci): blog sync'

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: 'chore(ci): blog sync'
          branch: bot/blog-sync
          delete-branch: true
          title: '[Bot] Blog Content Sync'
          body: |
            ## 🤖 自动博客内容同步

            此 PR 由 GitHub Actions 自动生成，包含博客内容的最新更新。

            ### 变更来源
            - Issue 事件触发：opened, closed, edited, renamed, labeled, unlabeled, reopened

            ### 检查清单
            - [ ] RSS 文件生成正常
            - [ ] 文章内容格式正确
            - [ ] 无敏感信息泄露
